<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>DIGIY DRIVER PRO — Nouvelle course</title>
<meta name="theme-color" content="#061b14"/>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
--bg:#061b14; --card:#0b2a1f; --line:rgba(255,255,255,.12);
--text:#eafff1; --muted:rgba(234,255,241,.72);
--primary:#22c55e; --shadow:0 18px 55px rgba(0,0,0,.42);
--r:18px; --max:980px;
}
*{box-sizing:border-box}

body{
margin:0;
color:var(--text);
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
background:var(--bg);
padding:16px;
}

.wrap{max-width:var(--max); margin:auto}

.top{
display:flex;
justify-content:space-between;
gap:10px;
flex-wrap:wrap;
border:1px solid var(--line);
border-radius:22px;
padding:14px;
background:rgba(255,255,255,.04);
}

h1{margin:0;font-size:22px}

.muted{color:var(--muted);font-weight:800;font-size:13px}

.pill{
padding:10px 12px;
border-radius:999px;
border:1px solid var(--line);
background:rgba(0,0,0,.18);
font-weight:900;
}

.btn{
border:1px solid var(--line);
background:rgba(255,255,255,.07);
color:var(--text);
padding:10px 12px;
border-radius:14px;
font-weight:900;
cursor:pointer;
}

.btn.primary{
background:var(--primary);
color:#042012;
}

.grid{display:grid;gap:14px;margin-top:14px}

@media(min-width:900px){
.grid{grid-template-columns:1fr 1fr}
}

.card{
border:1px solid var(--line);
border-radius:var(--r);
background:rgba(255,255,255,.05);
padding:14px;
}

.in{
width:100%;
padding:12px;
border-radius:14px;
border:1px solid rgba(255,255,255,.12);
background:rgba(0,0,0,.12);
color:var(--text);
font-size:15px;
font-weight:900;
}

.row{display:flex;gap:10px;flex-wrap:wrap}

.row>*{flex:1}

.list{display:grid;gap:10px;margin-top:10px}

.item{
display:flex;
justify-content:space-between;
padding:12px;
border-radius:16px;
border:1px solid rgba(255,255,255,.10);
background:rgba(0,0,0,.16);
}

.msg{margin-top:10px;font-weight:900}

.msg.ok{color:#86efac}
.msg.bad{color:#fca5a5}

</style>
</head>

<body>

<div class="wrap">

<div class="top">
<div>
<h1>Nouvelle course</h1>
<div class="muted">Crée une course, encaisse, avance.</div>
</div>

<div class="row" style="flex:0 0 auto">
<div class="pill" id="slugPill">slug: —</div>
<button class="btn" id="btnBack">⬅️ Retour</button>
</div>
</div>

<div class="grid" id="content">

<div class="card">

<h2>Créer une course</h2>

<div class="row">
<div>
<div class="muted">Départ</div>
<input class="in" id="pickup">
</div>

<div>
<div class="muted">Arrivée</div>
<input class="in" id="drop">
</div>
</div>

<div class="row" style="margin-top:10px">

<div>
<div class="muted">Prix</div>
<input class="in" id="price">
</div>

<div>
<div class="muted">Extras</div>
<input class="in" id="extras" value="0">
</div>

</div>

<div class="row" style="margin-top:10px">
<button class="btn primary" id="btnCreate">➕ Créer</button>
<button class="btn" id="btnReload">↻ Rafraîchir</button>
</div>

<div class="msg" id="msgCreate">Prêt.</div>

</div>


<div class="card">

<h2>Mes courses du jour</h2>

<div class="list" id="todayList">
<div class="item">Chargement…</div>
</div>

</div>

</div>
</div>


<script>

const SUPABASE_URL="https://wesqmwjjtsefyjnluosj.supabase.co"

const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY)

const qs=new URLSearchParams(location.search)

const slug=qs.get("slug")

document.getElementById("slugPill").textContent="slug: "+slug

document.getElementById("btnBack").onclick=()=>{
location.href="./?slug="+slug
}

const money=n=>Number(n||0).toLocaleString("fr-FR")+" FCFA"

function setMsg(txt,type){

const el=document.getElementById("msgCreate")

el.textContent=txt

el.className="msg "+(type||"")

}

function renderTrips(data){

const box=document.getElementById("todayList")

if(!data||data.length===0){

box.innerHTML=`<div class="item">Aucune course aujourd'hui</div>`

return

}

box.innerHTML=data.map(t=>`

<div class="item">

<div>

<b>${t.pickup_label} → ${t.drop_label}</b>

<div class="muted">${t.status}</div>

</div>

<div>

${money(t.revenue_fcfa)}

</div>

</div>

`).join("")

}

async function loadToday(){

const {data,error}=await sb.rpc(
"driver_list_today_by_slug",
{p_slug:slug}
)

if(error){

console.error(error)

return

}

renderTrips(data)

}

document.getElementById("btnReload").onclick=loadToday


document.getElementById("btnCreate").onclick=async()=>{

const pickup=document.getElementById("pickup").value.trim()

const drop=document.getElementById("drop").value.trim()

const price=parseInt(document.getElementById("price").value||0)

const extras=parseInt(document.getElementById("extras").value||0)

if(!pickup||!drop||price<=0){

setMsg("⚠️ Remplis tous les champs","bad")

return

}

try{

const {error}=await sb.rpc(

"driver_create_trip_by_slug",

{

p_slug:slug,

p_pickup_label:pickup,

p_drop_label:drop,

p_price_fcfa:price,

p_extras_fcfa:extras

}

)

if(error) throw error

setMsg("✅ Course enregistrée","ok")

document.getElementById("pickup").value=""

document.getElementById("drop").value=""

document.getElementById("price").value=""

document.getElementById("extras").value="0"

loadToday()

}catch(e){

console.error(e)

setMsg("❌ Erreur création","bad")

}

}

loadToday()

</script>

</body>
</html>
