<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>DIGIY DRIVER PRO — Mes tarifs</title>
  <meta name="theme-color" content="#061b14"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#061b14;--card:#0b2a1f;--line:rgba(255,255,255,.12);--text:#eafff1;--muted:rgba(234,255,241,.72);--primary:#22c55e;--shadow:0 18px 55px rgba(0,0,0,.42);--r:18px;--max:860px;}
    *{box-sizing:border-box}
    body{margin:0;color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);padding:16px}
    .wrap{max-width:var(--max);margin:0 auto}
    .card{border:1px solid var(--line);border-radius:var(--r);background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));box-shadow:var(--shadow);padding:16px}
    h1{margin:0 0 6px;font-size:22px;font-weight:1000}
    .muted{color:var(--muted);font-weight:800}
    .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .btn{border:1px solid var(--line);background:rgba(255,255,255,.07);color:var(--text);padding:12px 14px;border-radius:14px;font-weight:950;cursor:pointer}
    .btn.primary{border-color:rgba(34,197,94,.45);background:linear-gradient(135deg, rgba(34,197,94,.95), rgba(16,185,129,.88));color:#042012}
    .in{width:100%;padding:12px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.12);color:var(--text);font-size:15px;font-weight:900;outline:none}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>Ajouter un tarif</h1>
    <div class="muted">Tarifs simples, terrain. (SQL après.)</div>

    <div class="muted" style="margin-top:10px" id="slugText">slug: —</div>

    <div id="gate" style="margin-top:14px; display:none">
      <div class="muted">Slug requis. Colle ton slug puis ouvre.</div>
      <div style="margin-top:10px"><input class="in" id="gateSlug" placeholder="driver-221770000111"/></div>
      <div class="row">
        <button class="btn primary" id="btnOpen">🚀 Ouvrir</button>
        <button class="btn" id="btnBack">⬅️ Retour</button>
      </div>
    </div>

    <div id="content" style="margin-top:14px; display:none">
      <div class="grid">
        <div>
          <div class="muted">Nom</div>
          <input class="in" id="name" placeholder="Saly → Dakar"/>
        </div>
        <div>
          <div class="muted">Prix (FCFA)</div>
          <input class="in" id="price" inputmode="numeric" placeholder="7000"/>
        </div>
      </div>
      <div class="row">
        <button class="btn primary" id="btnSave">💾 Enregistrer</button>
        <button class="btn" id="btnBack2">⬅️ Retour</button>
      </div>
      <div class="muted" style="margin-top:10px" id="msg">Prêt.</div>
    </div>

  </div>
</div>

<script>
(function(){
  "use strict";
  const qs = new URLSearchParams(location.search);
  const slug = (qs.get("slug")||"").trim();
  const $ = (id)=>document.getElementById(id);

  $("slugText").textContent = "slug: " + (slug || "—");

  function goBack(){ location.href = "./?slug=" + encodeURIComponent(slug || ""); }

  if(!slug){
    $("gate").style.display = "block";
    $("btnOpen").onclick = ()=> {
      const s = ($("gateSlug").value||"").trim();
      if(!s) return;
      location.href = "./profil-chauffeur.html?slug=" + encodeURIComponent(s);
    };
    $("btnBack").onclick = ()=> location.href="./";
    return;
  }

  $("content").style.display = "block";
  $("btnBack2").onclick = goBack;

  $("btnSave").onclick = ()=>{
    const name = ($("name").value||"").trim();
    const price = ($("price").value||"").trim();
    $("msg").textContent = (name && price) ? "✅ Tarif enregistré (mock). Prochaine étape: SQL." : "⚠️ Remplis nom + prix.";
  };
})();
</script>
</body>
</html>
