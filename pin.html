  <script>
    window.DIGIY_SUPABASE_URL = "https://wesqmwjjtsefyjnluosj.supabase.co";
    window.DIGIY_SUPABASE_ANON_KEY = "sb_publishable_tGHItRgeWDmGjnd0CK1DVQ_BIep4Ug3";
    window.DIGIY_SUPABASE_ANON = window.DIGIY_SUPABASE_ANON_KEY;

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#061b14; --card:#0b2a1f; --line:rgba(255,255,255,.14);
      --text:#eafff1; --muted:rgba(234,255,241,.72);
      --gold:#facc15; --green:#22c55e; --red:#fb7185;
      --shadow:0 18px 55px rgba(0,0,0,.45); --r:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; display:grid; place-items:center;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:
        radial-gradient(900px 520px at 10% -10%, rgba(34,197,94,.20), transparent 60%),
        radial-gradient(900px 520px at 110% 0%, rgba(250,204,21,.14), transparent 55%),
        var(--bg);
      color:var(--text);
      padding:18px;
    }
    .wrap{width:100%; max-width:560px}
    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--line);
      border-radius:var(--r);
      padding:22px;
      box-shadow:var(--shadow);
    }
    .top{
      display:flex; align-items:flex-start; justify-content:space-between; gap:12px;
      margin-bottom:14px;
    }
    .brand{display:flex; flex-direction:column; gap:4px;}
    h1{
      margin:0;
      font-size:22px;
      letter-spacing:.2px;
      font-weight:950;
      background:linear-gradient(135deg, var(--green), var(--gold));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }
    .sub{
      margin:0;
      color:var(--muted);
      font-weight:750;
      line-height:1.45;
      font-size:13px;
    }
    .chip{
      display:inline-flex; align-items:center; gap:8px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.18);
      color:rgba(234,255,241,.92);
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
    }
    .chip b{color:var(--gold)}
    .hr{height:1px; background:rgba(255,255,255,.12); margin:14px 0}
    .label{
      font-size:13px;
      font-weight:900;
      color:rgba(234,255,241,.92);
      margin:0 0 8px;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .label small{color:rgba(234,255,241,.70); font-weight:800;}
    .row{display:flex; gap:10px; align-items:stretch;}
    input{
      flex:1;
      width:100%;
      padding:14px 14px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.22);
      color:var(--text);
      font-size:18px;
      font-weight:900;
      letter-spacing:.22em;
      outline:none;
    }
    input:focus{border-color:rgba(250,204,21,.55)}
    .iconbtn{
      width:56px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.08);
      color:var(--text);
      font-weight:950;
      cursor:pointer;
    }
    .btn{
      width:100%;
      margin-top:12px;
      border:0;
      border-radius:14px;
      padding:14px 16px;
      font-size:16px;
      font-weight:950;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      transition:transform .18s ease, box-shadow .18s ease;
    }
    .btn:active{transform:scale(.99)}
    .primary{
      background:linear-gradient(135deg, rgba(34,197,94,.95), rgba(16,185,129,.85));
      color:#042012;
      box-shadow:0 8px 22px rgba(34,197,94,.25);
    }
    .ghost{
      background:rgba(255,255,255,.08);
      border:1px solid var(--line);
      color:var(--text);
      box-shadow:none;
    }
    .btn:disabled{
      opacity:.6;
      cursor:not-allowed;
    }
    .msg{
      margin-top:12px;
      padding:12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(0,0,0,.22);
      color:var(--muted);
      font-weight:800;
      line-height:1.55;
      font-size:13px;
    }
    .msg.ok{border-color:rgba(34,197,94,.35); color:rgba(187,247,208,.95)}
    .msg.bad{border-color:rgba(251,113,133,.35); color:rgba(254,202,202,.95)}
    .tiny{
      margin-top:10px;
      display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap;
      color:rgba(234,255,241,.70);
      font-weight:800;
      font-size:12px;
    }
    .a{color:var(--gold); text-decoration:none; font-weight:950;}
    .a:hover{text-decoration:underline}
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <div class="brand">
          <h1>🦅 PORTE PIN — DIGIY DRIVER PRO</h1>
          <p class="sub">Accès sécurisé au cockpit chauffeur</p>
        </div>
        <div class="chip">
          <span>MODULE</span> <b>DRIVER</b>
        </div>
      </div>

      <div class="chip" style="width:100%; justify-content:space-between">
        <span>SLUG :</span>
        <b id="slugText">—</b>
      </div>

      <div class="hr"></div>

      <div class="label">
        <span>Entre ton PIN</span>
        <small id="hint">••••</small>
      </div>

      <div class="row">
        <input id="pin" type="password" inputmode="numeric" autocomplete="one-time-code" placeholder="••••" maxlength="8"/>
        <button class="iconbtn" id="toggle" type="button" aria-label="Afficher/masquer PIN">👁️</button>
      </div>

      <button class="btn primary" id="btnEnter" type="button">🚀 ENTRER</button>
      <button class="btn ghost" id="btnBack" type="button">⬅️ Retour</button>

      <div class="msg" id="msg">🔒 Vérification de l’accès…</div>

      <div class="tiny">
        <span>Support : <a class="a" href="https://wa.me/221771342889" target="_blank" rel="noopener noreferrer">WhatsApp</a></span>
        <span id="guardState">Guard: …</span>
      </div>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const COCKPIT_PAGE = "./cockpit.html";
      const HOME_PAGE = "./index.html";

      const $ = (id) => document.getElementById(id);

      const pinEl = $("pin");
      const slugText = $("slugText");
      const msg = $("msg");
      const btnEnter = $("btnEnter");
      const btnBack = $("btnBack");
      const toggle = $("toggle");
      const guardState = $("guardState");
      const hint = $("hint");

      let slug = "";
      let phone = "";

      function normPhone(p){
        const d = String(p || "").replace(/[^\d]/g, "");
        if (!d) return "";
        if (d.startsWith("221") && d.length === 12) return d;
        if (d.length === 9) return "221" + d;
        return d.length >= 9 ? d : "";
      }

      function normSlug(s){
        return String(s || "").trim().toLowerCase();
      }

      function setMsg(text, kind){
        msg.classList.remove("ok", "bad");
        if (kind) msg.classList.add(kind);
        msg.textContent = text;
      }

      function go(url, replace = false){
        if (replace) location.replace(url);
        else location.href = url;
      }

      function cockpitUrl(s){
        return COCKPIT_PAGE + (s ? ("?slug=" + encodeURIComponent(s)) : "");
      }

      async function loginWithPin(s, pin){
        if (!window.DIGIY_GUARD?.rpc) {
          return { ok: false, error: "guard indisponible" };
        }

        const tries = [
          { fn: "digiy_access_pin_login", body: { p_slug: s, p_pin: pin } },
          { fn: "digiy_pin_login", body: { p_slug: s, p_pin: pin } },
          { fn: "driver_pin_login", body: { p_slug: s, p_pin: pin } }
        ];

        for (const t of tries) {
          try {
            const res = await window.DIGIY_GUARD.rpc(t.fn, t.body);
            if (!res?.ok) continue;

            const data = res.data;

            if (data === true) return { ok: true, data: {} };

            if (data && typeof data === "object") {
              if (data.ok === true) return { ok: true, data };
              if (data.success === true) return { ok: true, data };
              if (data.access === true) return { ok: true, data };
            }
          } catch (_) {}
        }

        return { ok: false, error: "PIN invalide ou RPC absente" };
      }

      function applyIdentityFromState(state){
        slug = normSlug(state?.slug || slug);
        phone = normPhone(state?.phone || phone);

        slugText.textContent = slug || "—";

        if (window.DIGIY_GUARD?.rememberIdentity && (slug || phone)) {
          window.DIGIY_GUARD.rememberIdentity({ slug, phone });
        }
      }

      function extractPhoneFromLoginData(data){
        return normPhone(
          data?.phone ||
          data?.p_phone ||
          data?.driver_phone ||
          data?.owner_phone ||
          ""
        );
      }

      function extractSlugFromLoginData(data){
        return normSlug(
          data?.slug ||
          data?.workspace_slug ||
          data?.driver_slug ||
          ""
        );
      }

      async function boot(){
        try{
          if (!window.DIGIY_GUARD?.ready) {
            guardState.textContent = "Guard: ❌ absent";
            setMsg("❌ Guard indisponible sur cette page.", "bad");
            btnEnter.disabled = true;
            return;
          }

          const state = await window.DIGIY_GUARD.ready;
          applyIdentityFromState(state);

          guardState.textContent = "Guard: ✅ prêt";

          if (!slug){
            setMsg("❌ Slug manquant. Ouvre cette page avec ?slug=driver-...", "bad");
            btnEnter.disabled = true;
            return;
          }

          if (state?.access_ok || state?.pin_session_ok) {
            setMsg("✅ Accès déjà ouvert. Entrée directe vers le cockpit…", "ok");
            go(cockpitUrl(slug), true);
            return;
          }

          setMsg("🔒 Entre ton PIN pour ouvrir ton espace DRIVER PRO.", null);
          pinEl.focus();
        }catch(e){
          console.error(e);
          guardState.textContent = "Guard: ❌ erreur";
          setMsg("❌ Erreur de chargement de la porte PIN.", "bad");
        }
      }

      toggle.addEventListener("click", () => {
        const isPwd = pinEl.getAttribute("type") !== "text";
        pinEl.setAttribute("type", isPwd ? "text" : "password");
        toggle.textContent = isPwd ? "🙈" : "👁️";
        hint.textContent = isPwd ? (pinEl.value || "") : "••••";
      });

      pinEl.addEventListener("input", () => {
        const raw = pinEl.value;
        const clean = raw.replace(/[^\d]/g, "");
        if (clean !== raw) pinEl.value = clean;
        hint.textContent = pinEl.getAttribute("type") === "text" ? (pinEl.value || "") : "••••";
      });

      pinEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter") doLogin();
      });

      btnBack.addEventListener("click", () => {
        go(HOME_PAGE + (slug ? ("?slug=" + encodeURIComponent(slug)) : ""), true);
      });

      btnEnter.addEventListener("click", doLogin);

      async function doLogin(){
        const pin = String(pinEl.value || "").trim();

        if (!slug){
          setMsg("❌ Slug manquant.", "bad");
          return;
        }

        if (!pin || pin.length < 3){
          setMsg("❌ PIN trop court.", "bad");
          return;
        }

        btnEnter.disabled = true;
        setMsg("⏳ Vérification du PIN…", null);

        try{
          const res = await loginWithPin(slug, pin);

          if (!res.ok){
            setMsg("❌ " + (res.error || "PIN invalide"), "bad");
            btnEnter.disabled = false;
            return;
          }

          const data = res.data || {};
          const loginSlug = extractSlugFromLoginData(data) || slug;
          const loginPhone = extractPhoneFromLoginData(data) || phone;

          if (window.DIGIY_GUARD?.rememberPinAccess) {
            window.DIGIY_GUARD.rememberPinAccess({
              slug: loginSlug,
              phone: loginPhone,
              ttlHours: 6
            });
          }

          if (window.DIGIY_GUARD?.rememberIdentity) {
            window.DIGIY_GUARD.rememberIdentity({
              slug: loginSlug,
              phone: loginPhone
            });
          }

          if (window.DIGIY_GUARD?.refresh) {
            const refreshed = await window.DIGIY_GUARD.refresh();
            applyIdentityFromState(refreshed);
          } else {
            slug = loginSlug;
            phone = loginPhone;
          }

          setMsg("✅ Accès autorisé. Ouverture cockpit…", "ok");
          go(cockpitUrl(slug || loginSlug), true);
        }catch(e){
          console.error(e);
          setMsg("❌ Erreur pendant la vérification du PIN.", "bad");
          btnEnter.disabled = false;
        }
      }

      boot();
    })();
  </script>
</body>
</html>
